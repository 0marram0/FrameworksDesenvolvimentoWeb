<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Tabela personalizada</title>
    <link rel="stylesheet" href="estiloTabela.css">
</head>

<body>
    <tabela linha="5" coluna="5" borda="1px dotted blue">
        <expand linha="0" coluna="0" tamanho="4" tipo="coluna"></expand>
        <expand linha="0" coluna="1" tamanho="4" tipo="coluna"></expand>
        <expand linha="0" coluna="2" tamanho="3" tipo="linha"></expand>
        <expand linha="1" coluna="2" tamanho="3" tipo="linha"></expand>
        <expand linha="2" coluna="2" tamanho="3" tipo="linha"></expand>
        <expand linha="3" coluna="2" tamanho="3" tipo="linha"></expand>
    </tabela>
</body>

</html>
